name: Build desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            platform: mac
            arch: arm64
            artifact: mac-arm64
          - runner: macos-15-intel
            platform: mac
            arch: x64
            artifact: mac-x64
          - runner: windows-latest
            platform: win
            arch: x64
            artifact: win-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Audit dependencies, test metadata and build
        run: |
          npm audit --audit-level=high
          npm run check
      - name: Build macOS packages
        if: matrix.platform == 'mac'
        run: npm run dist:mac -- --${{ matrix.arch }}
      - name: Build Windows packages
        if: matrix.platform == 'win'
        run: npm run dist:win -- --${{ matrix.arch }}
      - name: Verify packaged app security
        run: npm run verify:packaged -- release
      - name: Collect macOS assets
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
          retention-days: 1
      - name: Collect Windows assets
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error
          retention-days: 1

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout release notes
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Download all packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum -- * > SHA256SUMS.txt
      - name: Attest release provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: release-assets/*
      - name: Publish a new immutable-friendly GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          NOTES_FILE="docs/releases/${TAG}.md"
          test -f "$NOTES_FILE"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists; refusing to overwrite published assets."
            exit 1
          fi
          gh release create "$TAG" release-assets/* --repo "$REPO" --verify-tag --draft --title "微信年轮 $TAG" --notes-file "$NOTES_FILE"
          gh release edit "$TAG" --repo "$REPO" --draft=false --latest
